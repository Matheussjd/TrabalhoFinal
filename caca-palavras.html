<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça-Palavras Educativo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main> 

        <h1>CAÇA-PALAVRAS</h1>

        <p class="instrucao">
            Clique nas letras para formar a palavra correspondente à imagem.
        </p>

        
        <div class="atividade">
            <img src="img/raposa.jpeg" alt="Raposa">
            <div>
                <div id="raposa" class="grade"></div> 
                <p id="msgRaposa"></p>
            </div>
        </div>

        
        <div class="atividade">
            <img src="img/boca.jpeg" alt="Boca">
            <div>
                <div id="boca" class="grade"></div>
                <p id="msgBoca"></p>
            </div>
        </div>

        
        <div class="atividade">
            <img src="img/gato.jpeg" alt="Gato">
            <div>
                <div id="gato" class="grade"></div> 
                <p id="msgGato"></p>
            </div>
        </div>

       
        <div class="atividade">
            <img src="img/banana.jpeg" alt="Banana">
            <div>
                <div id="banana" class="grade"></div>
                <p id="msgBanana"></p>
            </div>
        </div>

        <a href="index.html" class="btn">
            Voltar para Página Inicial
        </a>

    </main>

    <script src="js/script.js"></script>

</body>
</html>
